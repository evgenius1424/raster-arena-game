<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pixi CDN test</title>
    <style>body { background: #111; color: #fff; font-family: monospace; padding: 16px; }</style>
</head>
<body>
<pre id="log"></pre>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8.17.1/dist/pixi.min.js"></script>
<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n'
    console.log(msg)
}

async function test() {
    log('navigator.gpu before patch: ' + (typeof navigator.gpu))

    try {
        Object.defineProperty(Navigator.prototype, 'gpu', { get: () => undefined, configurable: true })
    } catch (e) {
        log('gpu patch failed: ' + e.message)
    }

    log('navigator.gpu after patch: ' + (typeof navigator.gpu))
    log('PIXI version: ' + PIXI.VERSION)
    log('calling app.init...')

    const app = new PIXI.Application()

    const timeout = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('timeout after 8s')), 8000)
    )

    try {
        await Promise.race([
            app.init({
                width: 400,
                height: 300,
                background: 0x1a1a2e,
                preference: 'webgl',
                skipExtensionImports: true,
            }),
            timeout
        ])
        log('SUCCESS! renderer type: ' + app.renderer?.type)
        app.canvas.style.border = '2px solid lime'
        document.getElementById('game').appendChild(app.canvas)
    } catch (err) {
        log('FAILED: ' + err.message)
    }
}

test()
</script>
</body>
</html>
